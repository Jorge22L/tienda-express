<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
<div class="container mt-4">
    <div class="row g-0">
        <div class="col-md-4">
            <img>
        </div>
        <div class="col-md-8">
            <div class="card-body">
                <h2 th:text="${producto.nombre}">Nombre</h2>
                <p th:text="${producto.descripcion}">Descripcion</p>
                <p><strong>Precio: </strong>$<span th:text="${producto.precio}"></span></p>
                <p><strong>Stock: </strong>$<span th:text="${producto.stock}"></span></p>
                <p><strong>Categoria: </strong>$<span th:text="${producto.categoria.nombre}"></span></p>

                <a th:href="@{/productos}" class="btn btn-secondary">Volver</a>
                <a th:href="@{/productos/editar/{id}(id=${producto.id})}" class="btn btn-warning">Editar</a>
            </div>
        </div>
    </div>


</div>
</body>
</html>
