<!DOCTYPE html>
<html lang="es" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-dark text-light">
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1>Productos</h1>
        <a class="btn btn-primary" th:href="@{/productos/nuevo}">Nuevo Producto</a>
    </div>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="producto : ${productos}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${producto.nombre}">Nombre</h5>
                    <p class="card-text" th:text="${producto.descripcion}">Descripcion</p>
                    <p class="card-text" th:text="${producto.precio}">Precio</p>
                    <p class="card-text" th:text="${producto.stock}"> Stock</p>
                    <p class="card-text" th:text="${producto.categoria.nombre}"> Categoria</p>
                    <a th:href="@{/productos/{id}(id=${producto.id})}" class="btn btn-info btn-sm">Ver</a>
                    <a th:href="@{/productos/editar/{id} (id=${producto.id})}" class="btn btn-warning btn-sm">Editar</a>
                    <a th:href="@{/productos/eliminar/{id}(id=${producto.id})}" class="btn btn-danger btn-sm" onclick="return confirm('¿Desea eliminar este prodcuto?')">Eliminar</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
